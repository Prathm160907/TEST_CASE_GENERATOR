<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Test Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .tab-btn {
  padding: 10px 24px;
  border-radius: 8px;
  border: 1px solid #4f46e5;
  background: transparent;
  color: #94a3b8;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}

.tab-btn.active {
  background: #4f46e5;
  color: white;
}

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: #a78bfa;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .upload-box {
      background: #1e2130;
      border: 2px dashed #4f46e5;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      margin-bottom: 24px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .upload-box:hover { border-color: #a78bfa; }

    .upload-box input { display: none; }

    .upload-box label {
      cursor: pointer;
      font-size: 16px;
      color: #94a3b8;
    }

    .upload-box .icon { font-size: 48px; margin-bottom: 12px; }

    .file-name {
      margin-top: 12px;
      color: #a78bfa;
      font-weight: 600;
      font-size: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 16px;
    }

    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #2d3148; color: #64748b; cursor: not-allowed; }

    .btn-download {
      background: #059669;
      display: none;
    }
    .btn-download:hover { background: #047857; }

    .status {
      text-align: center;
      color: #64748b;
      margin-bottom: 24px;
      min-height: 24px;
    }

    .results { display: none; }

    .results h2 {
      color: #a78bfa;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .function-card {
      background: #1e2130;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      border: 1px solid #2d3148;
    }

    .function-header {
      padding: 14px 20px;
      background: #2d3148;
      font-weight: 700;
      color: #7dd3fc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .function-header span { font-size: 12px; color: #64748b; }

    .function-body {
      padding: 16px 20px;
      display: none;
    }

    .function-body pre {
      background: #0f1117;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.6;
      color: #a5b4fc;
      white-space: pre-wrap;
    }

    .badge {
      background: #4f46e5;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .supported {
      text-align: center;
      color: #475569;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI Test Generator</h1>
    <p class="subtitle">Upload any code file and get test cases instantly</p>

    <!-- Tab Switcher -->
<div style="display:flex; gap:10px; margin-bottom:16px;">
  <button class="tab-btn active" id="tabUpload" onclick="switchTab('upload')">📂 Upload File</button>
  <button class="tab-btn" id="tabPaste" onclick="switchTab('paste')">📋 Paste Code</button>
</div>

<!-- Upload Tab -->
<div id="uploadTab">
  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📂</div>
    <label>Click to upload your code file</label>
    <div class="file-name" id="fileName">No file selected</div>
    <input type="file" id="fileInput" accept=".js,.py,.java,.cpp" onchange="onFileSelect(this)"/>
  </div>
  <p class="supported">Supports: .js &nbsp;•&nbsp; .py &nbsp;•&nbsp; .java &nbsp;•&nbsp; .cpp</p>
</div>

<!-- Paste Tab -->
<div id="pasteTab" style="display:none;">
  <div style="margin-bottom:12px;">
    <select id="languageSelect" style="background:#1e2130; color:#e2e8f0; border:1px solid #4f46e5; padding:8px 16px; border-radius:8px; font-size:14px;">
      <option value="js">JavaScript</option>
      <option value="py">Python</option>
      <option value="java">Java</option>
      <option value="cpp">C++</option>
    </select>
  </div>
  <textarea id="pasteCode" placeholder="Paste your code here..." style="
    width:100%; height:220px; background:#1e2130; color:#a5b4fc;
    border:2px dashed #4f46e5; border-radius:12px; padding:16px;
    font-family:monospace; font-size:13px; resize:vertical;
    outline:none; line-height:1.6;
  "></textarea>
</div>

    <br/>

    <button class="btn" id="generateBtn" onclick="generate()">
      ⚡ Generate Tests
    </button>

    <p class="status" id="status"></p>

    <button class="btn btn-download" id="downloadBtn" onclick="download()">
      📦 Download All Tests (.zip)
    </button>

    <div class="results" id="results">
      <h2 id="resultsTitle"></h2>
      <div id="functionList"></div>
    </div>
  </div>

  <script>
    let activeTab = "upload";

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("uploadTab").style.display = tab === "upload" ? "block" : "none";
  document.getElementById("pasteTab").style.display = tab === "paste" ? "block" : "none";
  document.getElementById("tabUpload").classList.toggle("active", tab === "upload");
  document.getElementById("tabPaste").classList.toggle("active", tab === "paste");

  // Always enable button in paste mode
  if (tab === "paste") {
    document.getElementById("generateBtn").disabled = false;
  } else {
    document.getElementById("generateBtn").disabled = !selectedFile;
  }
}
    let selectedFile = null;

    function onFileSelect(input) {
      selectedFile = input.files[0];
      document.getElementById("fileName").textContent = selectedFile.name;
      document.getElementById("generateBtn").disabled = false;
    }

    async function generate() {
  if (activeTab === "upload" && !selectedFile) {
    document.getElementById("status").textContent = "❌ Please select a file first";
    return;
  }

      const btn = document.getElementById("generateBtn");
      const status = document.getElementById("status");
      const results = document.getElementById("results");
      const downloadBtn = document.getElementById("downloadBtn");

      btn.disabled = true;
      btn.textContent = "⏳ Generating...";
      status.textContent = "Uploading and analyzing your code...";
      results.style.display = "none";
      downloadBtn.style.display = "none";

      const formData = new FormData();

if (activeTab === "paste") {
  const code = document.getElementById("pasteCode").value.trim();
  const lang = document.getElementById("languageSelect").value;
  if (!code) {
    status.textContent = "❌ Please paste some code first";
    btn.disabled = false;
    btn.textContent = "⚡ Generate Tests";
    return;
  }
  // Convert pasted code into a fake file
  const blob = new Blob([code], { type: "text/plain" });
  formData.append("file", blob, `pasted.${lang}`);
} else {
  formData.append("file", selectedFile);
}
      try {
        const res = await fetch("/generate", { method: "POST", body: formData });
        const data = await res.json();

        if (data.error) {
          status.textContent = `❌ Error: ${data.error}`;
          btn.disabled = false;
          btn.textContent = "⚡ Generate Tests";
          return;
        }

        status.textContent = `✅ Generated tests for ${data.total} function(s)!`;
        showResults(data.functions, data.report);
        downloadBtn.style.display = "block";

      } catch (err) {
        status.textContent = `❌ Something went wrong: ${err.message}`;
      }

      btn.disabled = false;
      btn.textContent = "⚡ Generate Tests";
    }

    function showResults(functions, report) {
  const results = document.getElementById("results");
  const list = document.getElementById("functionList");
  const title = document.getElementById("resultsTitle");

  title.textContent = `📋 Generated ${functions.length} Test File(s)`;
  list.innerHTML = "";

  // Show each function's test
  functions.forEach((fn, i) => {
    const card = document.createElement("div");
    card.className = "function-card";
    // Detect if test has errors
const hasError = fn.tests.toLowerCase().includes("error") ||
                 fn.tests.toLowerCase().includes("throw") ||
                 fn.tests.toLowerCase().includes("fail");

card.innerHTML = `
  <div class="function-header" onclick="toggleCard(${i})" style="color: ${hasError ? '#fca5a5' : '#7dd3fc'}">
    <span>${hasError ? '⚠️' : '🧪'} ${fn.name}.test.js</span>
    <span class="badge" style="background: ${hasError ? '#7f1d1d' : '#4f46e5'}">${hasError ? 'Has Error Cases' : 'Click to preview'}</span>
  </div>
  <div class="function-body" id="card-${i}">
    <pre style="color: ${hasError ? '#fca5a5' : '#a5b4fc'}">${escapeHtml(fn.tests)}</pre>
  </div>
`;
    list.appendChild(card);
  });

  // Show report card at the bottom
  const reportCard = document.createElement("div");
  reportCard.className = "function-card";
  reportCard.innerHTML = `
    <div class="function-header" onclick="toggleCard('report')" style="color: #6ee7b7">
      <span>📝 report.md</span>
      <span class="badge">Click to preview</span>
    </div>
    <div class="function-body" id="card-report">
      <pre style="color: #6ee7b7">${escapeHtml(report)}</pre>
    </div>
  `;
  list.appendChild(reportCard);

  results.style.display = "block";
}

    function toggleCard(i) {
      const body = document.getElementById(`card-${i}`);
      body.style.display = body.style.display === "block" ? "none" : "block";
    }

    function download() {
      window.location.href = "/download";
    }

    function escapeHtml(text) {
  if (!text) return "";
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
  </script>
</body>
</html>
